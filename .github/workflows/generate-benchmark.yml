name: Generate benchmark PPT

on:
  workflow_dispatch:
  push:
    paths:
      - "Assets/**"
      - "Database/**"
      - "Scripts/**"
      - "config.yaml"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate assets
        run: python Scripts/validate_assets.py

      - name: Generate PowerPoint
        run: python Scripts/benchmark_generator.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Output/Residential_ESS_Dimension_Benchmark.pptx
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Auto-generate dimension benchmark PPT"
            git push
          fi

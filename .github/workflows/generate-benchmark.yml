name: Generate benchmark PPT

on:
  workflow_dispatch:
  push:
    paths:
      - "**/Assets/**"
      - "**/Database/**"
      - "**/Scripts/**"
      - "**/requirements.txt"
      - "**/config.yaml"
      - ".github/workflows/generate-benchmark.yml"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate toolkit project
        shell: bash
        run: |
          set -euo pipefail
          GENERATOR="$(find "$GITHUB_WORKSPACE" -type f -path '*/Scripts/benchmark_generator.py' | head -n 1)"
          if [ -z "$GENERATOR" ]; then
            echo "ERROR: Scripts/benchmark_generator.py was not found."
            echo "Repository files currently visible to the runner:"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$(dirname "$GENERATOR")")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Toolkit project found at: $PROJECT_DIR"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$PROJECT_DIR/requirements.txt" ]; then
            python -m pip install --upgrade pip
            python -m pip install -r "$PROJECT_DIR/requirements.txt"
          else
            python -m pip install --upgrade pip
            python -m pip install python-pptx Pillow openpyxl PyYAML
          fi

      - name: Validate assets
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          if [ -f "Scripts/validate_assets.py" ]; then
            python Scripts/validate_assets.py
          else
            echo "Scripts/validate_assets.py not found; skipping validation."
          fi

      - name: Generate PowerPoint
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          python Scripts/benchmark_generator.py

      - name: Collect generated PowerPoint
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_FILE="$(find "$PROJECT_DIR/Output" -maxdepth 1 -type f -name '*.pptx' | head -n 1)"
          if [ -z "$OUTPUT_FILE" ]; then
            echo "ERROR: No PPTX file was generated in $PROJECT_DIR/Output"
            find "$PROJECT_DIR" -maxdepth 4 -type f | sort
            exit 1
          fi
          cp "$OUTPUT_FILE" "$GITHUB_WORKSPACE/Residential_ESS_Dimension_Benchmark.pptx"
          echo "Generated file: $OUTPUT_FILE"

      - name: Upload generated PPT
        uses: actions/upload-artifact@v4
        with:
          name: Residential_ESS_Dimension_Benchmark
          path: Residential_ESS_Dimension_Benchmark.pptx
          if-no-files-found: error
          retention-days: 30

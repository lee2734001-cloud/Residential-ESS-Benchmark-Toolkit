project:
  name: Residential ESS Benchmark Toolkit
  version: 1.0.0
  language: en
  benchmark_condition: 10 kW three-phase inverter + 1 battery pack

paths:
  database_xlsx: Database/products.xlsx
  database_csv: Database/products.csv
  output_pptx: Output/Residential_ESS_Dimension_Benchmark.pptx

design:
  slide_ratio: 16:9
